services:
  # ── 1. Node.js Backend ─────────────────────────────────────────────
  - type: web
    name: caremind-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CLIENT_URL
        sync: false          # set to your Render frontend URL after deploy
      - key: ML_SERVICE_URL
        sync: false          # set to your Render ML service URL after deploy
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d

  # ── 2. Python ML Service ────────────────────────────────────────────
  - type: web
    name: caremind-ml-service
    runtime: python
    rootDir: python-ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  # ── 3. React Frontend (Static Site) ────────────────────────────────
  - type: web
    name: caremind-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your Render backend URL + /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
